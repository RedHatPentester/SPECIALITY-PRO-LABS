<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINDEL — Shadow Intelligence Network</title><link rel="stylesheet" href="/css/style.css"></head><body>
<div class="login-wrap">
  <div class="login-left">
    <img class="login-char" src="/images/sindel.png" alt="SINDEL">
    <div class="login-char-overlay"></div>
  </div>
  <div class="login-right">
    <div class="login-box">
      <div class="login-brand">
        <div class="eyebrow">Shadow Intelligence Network</div>
        <h1>SIN<em>DEL</em></h1>

      </div>
      <div class="login-divider"></div>
      <div id="err" class="alert alert-red" style="display:none"></div>
      <div class="form-group"><label>Operative Email</label>
        <input class="form-control" id="email" type="email" placeholder="operative@sindel.ops" autocomplete="off">
      </div>
      <div class="form-group"><label>Passphrase</label>
        <input class="form-control" id="pass" type="password" placeholder="••••••••••••">
      </div>
      <button class="btn btn-crimson btn-full" onclick="doLogin()">Access Network</button>
      <div style="margin-top:24px;text-align:center;color:var(--grey);font-size:.7rem;letter-spacing:.08em">
        <span style="color:var(--crimson2);letter-spacing:.06em">Property of Hive Consult, Ghana. Designed by Nana Sei Anyemedu.</span>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
async function doLogin(){
  $('err').style.display='none';
  try{
    const d=await api('POST','/api/auth/login',{email:$('email').value.trim(),password:$('pass').value});
    localStorage.setItem('sd_token',d.token);
    location.href='/dashboard.html';
  }catch(e){$('err').textContent=e.message;$('err').style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(getToken())location.href='/dashboard.html';
</script></body></html>
