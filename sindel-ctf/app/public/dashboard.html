<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINDEL — Dashboard</title><link rel="stylesheet" href="/css/style.css"></head><body>
<nav></nav>
<div class="page">
  <div class="page-header"><h1>⚡ OPERATIVE <span>DASHBOARD</span></h1><p>Shadow Intelligence Network — Operative Command Centre</p></div>
  <div class="grid-4" id="stats" style="margin-bottom:22px"></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h3>🎯 My Identity</h3></div>
      <div id="identity"><div style="color:var(--grey2)">Loading...</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>🔑 My Encoded References</h3></div>
      <p style="color:var(--grey2);font-size:.8rem;margin-bottom:12px">Your access identifiers across encoding schemes.</p>
      <div id="myRefs"><div style="color:var(--grey2)">Loading...</div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if(!requireLogin()){}
renderNav();
async function init(){
  const agent=await loadUser();if(!agent){location.href='/login.html';return;}
  const[md,id,rd]=await Promise.all([
    api('GET','/api/my/missions').catch(()=>({missions:[]})),
    api('GET','/api/my/intel').catch(()=>({reports:[]})),
    api('GET','/api/my/refs').catch(()=>({refs:[],tokens:[],qr_code:''})),
  ]);
  $('stats').innerHTML=`
    <div class="stat-card"><div class="label">Codename</div><div class="value" style="font-size:1rem;letter-spacing:.1em">${agent.codename}</div><div class="sub">${agent.faction} Faction</div></div>
    <div class="stat-card teal"><div class="label">Clearance</div><div class="value" style="font-size:1rem">${agent.clearance}</div><div class="sub">${agent.rank}</div></div>
    <div class="stat-card gold"><div class="label">Missions</div><div class="value">${md.missions.length}</div><div class="sub">Active assignments</div></div>
    <div class="stat-card grey"><div class="label">Intel Reports</div><div class="value">${id.reports.length}</div><div class="sub">Filed reports</div></div>`;
  $('identity').innerHTML=`<div class="code-block">${JSON.stringify({id:agent.id,uuid:agent.uuid,username:agent.username,slug:agent.slug,email:agent.email,codename:agent.codename,faction:agent.faction,clearance:agent.clearance,rank:agent.rank},null,2)}</div>`;
  const refs=rd.refs||[];
  const tokens=rd.tokens||[];
  $('myRefs').innerHTML=`
    ${refs.map(r=>`<div style="margin-bottom:8px"><div style="color:var(--grey2);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em">${r.ref_type.toUpperCase()}</div><div class="code-block" style="font-size:.76rem;margin-top:3px">${r.ref_value}</div></div>`).join('')}
    ${tokens.map(t=>`<div style="margin-bottom:8px"><div style="color:var(--grey2);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em">${t.token_type.replace('_',' ')}</div><div class="code-block" style="font-size:.76rem;margin-top:3px">${t.token}</div></div>`).join('')}
    ${rd.qr_code?`<div style="margin-bottom:8px"><div style="color:var(--grey2);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em">QR TOKEN</div><div class="code-block" style="font-size:.76rem;margin-top:3px">${rd.qr_code}</div></div>`:''}`;
}
init();
</script></body></html>
