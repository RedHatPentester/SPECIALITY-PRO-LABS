<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINDEL — Files</title><link rel="stylesheet" href="/css/style.css"></head><body>
<nav></nav>
<div class="page">
  <div class="page-header"><h1>📂 CLASSIFIED <span>FILES</span></h1><p>Operative dossiers and mission documents</p></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h3>📁 File Path Access</h3></div>
      <p style="color:var(--grey2);font-size:.8rem;margin-bottom:12px">Retrieve files using their path reference. Path is relative to the files directory.</p>
      <div class="form-group"><label>File Path</label>
        <input class="form-control" id="filePath" placeholder="e.g. agents/agent_001.txt">
      </div>
      <button class="btn btn-crimson" onclick="readFile()">Read File</button>
      <div id="fileResult" style="margin-top:14px"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>📋 My Files</h3></div>
      <div id="myFiles"><div style="color:var(--grey2)">Loading...</div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if(!requireLogin()){}
renderNav();
async function init(){
  const d=await api('GET','/api/files');
  $('myFiles').innerHTML=d.files.length?d.files.map(f=>`
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;color:var(--parchment2);font-size:.88rem">${f.filename}</div>
          <div style="color:var(--grey2);font-size:.74rem;margin-top:2px">${f.description||'—'}</div>
          <div class="code-block" style="font-size:.7rem;margin-top:5px;cursor:pointer" onclick="usePath('${f.filepath}')">${f.filepath}</div>
        </div>
        ${classBadge(f.classification)}
      </div>
    </div>`).join(''):'<div style="color:var(--grey2)">No files assigned</div>';
}
function usePath(p){$('filePath').value=p;}
async function readFile(){
  const p=$('filePath').value.trim();if(!p)return;
  try{
    const d=await api('GET',`/api/files/read?path=${encodeURIComponent(p)}`);
    $('fileResult').innerHTML=`
      <div class="code-block" style="max-height:300px;overflow:auto;white-space:pre-wrap">${d.content}</div>
      ${d.hive_flag?`<div class="flag-box" style="margin-top:10px"><strong>🚩 FILE PATH IDOR FLAG</strong>${d.hive_flag}<br><small style="color:var(--grey2)">${d.note||''}</small></div>`:''}`;
  }catch(e){$('fileResult').innerHTML=`<div class="alert alert-red">${e.message}</div>`;}
}
init();
</script></body></html>
