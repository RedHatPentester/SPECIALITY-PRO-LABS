<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINDEL — Intel</title><link rel="stylesheet" href="/css/style.css"></head><body>
<nav></nav>
<div class="page">
  <div class="page-header"><h1>📡 INTEL <span>REPORTS</span></h1><p>Slug-based classified intelligence reports</p></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h3>🔍 Slug Lookup</h3></div>
      <p style="color:var(--grey2);font-size:.8rem;margin-bottom:12px">Retrieve intel using human-readable slug identifier.</p>
      <div class="form-group"><label>Report Slug</label>
        <input class="form-control" id="intelSlug" placeholder="e.g. phantom-intel-alpha">
      </div>
      <button class="btn btn-crimson" onclick="lookupIntel()">Retrieve Report</button>
      <div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:4px;border:1px solid var(--border)">
        <div style="color:var(--grey2);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Known Slug Patterns</div>
        <div style="font-family:monospace;font-size:.74rem;color:var(--parchment)">{codename}-intel-alpha</div>
        <div style="font-family:monospace;font-size:.74rem;color:var(--parchment)">{codename}-intel-bravo</div>
        <div style="font-family:monospace;font-size:.74rem;color:var(--parchment)">{codename}-cyber-gamma</div>
      </div>
      <div id="intelResult" style="margin-top:14px"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>📋 My Reports</h3></div>
      <div id="myIntel"><div style="color:var(--grey2)">Loading...</div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if(!requireLogin()){}
renderNav();
async function init(){
  const d=await api('GET','/api/my/intel');
  $('myIntel').innerHTML=d.reports.length?d.reports.map(r=>`
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;color:var(--parchment2)">${r.title}</div>
      <div class="code-block" style="font-size:.72rem;margin-top:6px;cursor:pointer" onclick="useSlug('${r.slug}')">${r.slug}</div>
      ${classBadge(r.classification)}
    </div>`).join(''):'<div style="color:var(--grey2)">No reports filed</div>';
}
function useSlug(slug){$('intelSlug').value=slug;}
async function lookupIntel(){
  const slug=$('intelSlug').value.trim();if(!slug)return;
  try{
    const d=await api('GET',`/api/intel/${slug}`);
    $('intelResult').innerHTML=renderAgent(d.report,d.hive_flag,d.note);
  }catch(e){$('intelResult').innerHTML=`<div class="alert alert-red">${e.message}</div>`;}
}
init();
</script></body></html>
