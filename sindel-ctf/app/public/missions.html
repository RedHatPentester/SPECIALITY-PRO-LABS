<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SINDEL — Missions</title><link rel="stylesheet" href="/css/style.css"></head><body>
<nav></nav>
<div class="page">
  <div class="page-header"><h1>🎯 MISSION <span>FILES</span></h1><p>UUID-based mission dossiers</p></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><h3>🔑 Mission UUID Lookup</h3></div>
      <p style="color:var(--grey2);font-size:.8rem;margin-bottom:12px">Retrieve mission details using UUID. UUIDs are exposed in mission lists.</p>
      <div class="form-group"><label>Mission UUID</label>
        <input class="form-control" id="missionUUID" placeholder="e.g. 550e8400-e29b-41d4-a716-...">
      </div>
      <button class="btn btn-crimson" onclick="lookupMission()">Retrieve Mission</button>
      <div id="missionResult" style="margin-top:14px"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>📋 My Missions</h3></div>
      <div id="myMissions"><div style="color:var(--grey2)">Loading...</div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if(!requireLogin()){}
renderNav();
async function init(){
  const d=await api('GET','/api/my/missions');
  $('myMissions').innerHTML=d.missions.length?d.missions.map(m=>`
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-weight:700;color:var(--parchment2);letter-spacing:.04em">${m.title}</div>
        <div style="color:var(--grey2);font-size:.74rem;margin-top:3px">${m.location||'—'} · ${m.mission_date||'—'}</div>
        <div class="code-block" style="font-size:.68rem;margin-top:6px;cursor:pointer" onclick="useUUID('${m.uuid}')">${m.uuid}</div></div>
        ${classBadge(m.classification)}
      </div>
    </div>`).join(''):'<div style="color:var(--grey2)">No missions assigned</div>';
}
function useUUID(uuid){$('missionUUID').value=uuid;}
async function lookupMission(){
  const uuid=$('missionUUID').value.trim();if(!uuid)return;
  try{
    const d=await api('GET',`/api/missions/uuid/${uuid}`);
    $('missionResult').innerHTML=renderAgent(d.mission,d.hive_flag,d.note);
  }catch(e){$('missionResult').innerHTML=`<div class="alert alert-red">${e.message}</div>`;}
}
init();
</script></body></html>
